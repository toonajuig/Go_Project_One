# yaml-language-server: $schema=https://render.com/schema/render.yaml.json
previews:
  generation: off

services:
  - type: web
    name: go-sensei-lab
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /healthz
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 22.22.0
      - key: BOARD_AI_PROVIDER
        value: openai
      - key: OPENAI_MODEL
        value: gpt-5.4-mini
      - key: OPENAI_MOVE_MODEL
        value: gpt-5.4-mini
      - key: OPENAI_API_KEY
        sync: false
