# Render-friendly KataGo analysis config for small CPU-only instances.
# Keep the thread and cache counts low so the service can boot reliably.

logToStderr = true
logDir = analysis_logs
reportAnalysisWinratesAs = BLACK

# The server sets maxVisits per request, but a conservative default is useful
# when KataGo is queried manually.
maxVisits = 240

# Favor stronger move choice over broad exploratory analysis.
wideRootNoise = 0.0

# Prefer clean human-style game endings instead of wandering around settled
# territory once the score is effectively decided.
conservativePass = true
preventCleanupPhase = true
enablePassingHacks = true
rootEndingBonusPoints = 0.5
rootPruneUselessMoves = true

# Limit concurrency to reduce CPU and memory pressure during startup and play.
numAnalysisThreads = 1
numSearchThreadsPerAnalysisThread = 4
nnMaxBatchSize = 4
nnCacheSizePowerOfTwo = 17
nnMutexPoolSizePowerOfTwo = 13
nnRandomize = true
